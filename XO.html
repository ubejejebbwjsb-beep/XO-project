<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة Tic-Tac-Toe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1> Wlcome website Nabil </h1>
    <h2> Game play___(X , O)____</h2>     

    <div class="status">
        {% if winner %}
            <span class="winner">الفائز هو اللاعب: {{ winner }}! 🎉</span>
        {% elif check_draw %}
            <span class="draw">تعادل! لا يوجد فائز. 🤝</span>
        {% else %}
            <span>دور اللاعب الحالي: {{ turn }}</span>
        {% endif %}
    </div>

    <div class="board">
        {% for cell in board %}
            {% set index = loop.index0 %}
            <form action="{{ url_for('move', sqare_number=index) }}" method="POST">
                <button type="submit" class="cell-btn" 
                        {% if cell != '' or winner or check_draw %} disabled {% endif %}>
                    {{ cell }}
                </button>
            </form>
        {% endfor %}
    </div>

    <a href="{{ url_for('reset') }}">
        <button class="reset-btn">إعادة اللعب</button>
    </a>

</body>
</html>
